<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi central1 - Laporan Bulanan</title>
    <style>
        :root { --primary: #185FA5; --success: #3B6D11; --danger: #A32D2D; --bg: #f5f5f3; --border: rgba(0,0,0,0.12); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1a1a18; }
        .app { max-width: 600px; margin: 0 auto; min-height: 100vh; background: #fff; display: flex; flex-direction: column; }
        .topbar { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .nav { display: flex; border-bottom: 1px solid var(--border); }
        .nav-btn { flex: 1; padding: 15px; border: none; background: none; cursor: pointer; color: #666; }
        .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); font-weight: 600; }
        .content { padding: 20px; flex: 1; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: #f9f9f7; padding: 15px; border-radius: 10px; border: 1px solid var(--border); }
        .btn { padding: 10px; border-radius: 8px; border: none; cursor: pointer; width: 100%; font-weight: 500; }
        .btn-main { background: var(--primary); color: #fff; }
        .btn-outline { background: #fff; border: 1px solid var(--border); margin-top: 10px; }
        .list-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .text-green { color: var(--success); font-weight: 600; }
        .text-red { color: var(--danger); font-weight: 600; }
    </style>
</head>
<body>

<div class="app">
    <div class="topbar">
        <b style="color:var(--primary)">WiFi central1</b>
        <small id="cloud-status" style="color:#666">Syncing...</small>
    </div>

    <nav class="nav">
        <button class="nav-btn active" onclick="openPage('dash', this)">Dashboard</button>
        <button class="nav-btn" onclick="openPage('vouch', this)">Voucher</button>
        <button class="nav-btn" onclick="openPage('finance', this)">Keuangan</button>
    </nav>

    <div class="content">
        <div id="page-dash" class="page active">
            <div class="stat-grid">
                <div class="stat-box">
                    <small>Saldo Bulan Ini</small><br>
                    <span id="month-total" class="text-green" style="font-size:18px">Rp0</span>
                </div>
                <div class="stat-box">
                    <small>Voucher Terjual</small><br>
                    <span id="month-count" style="font-size:18px; font-weight:600">0</span>
                </div>
            </div>
            <div class="card">
                <b>Aktivitas Terakhir</b>
                <div id="recent-list"></div>
            </div>
        </div>

        <div id="page-vouch" class="page">
            <div class="card">
                <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-bottom:15px;">
                    <button class="btn btn-outline" onclick="setPrice(10000, this)">10K</button>
                    <button class="btn btn-outline" onclick="setPrice(20000, this)">20K</button>
                    <button class="btn btn-outline" onclick="setPrice(50000, this)">50K</button>
                </div>
                <button class="btn btn-main" onclick="generateVoucher()">CETAK VOUCHER</button>
                <div id="v-result" style="display:none; text-align:center; margin-top:15px; background:#f4f4f4; padding:15px; border-radius:8px;">
                    <h2 id="v-code" style="letter-spacing:5px">------</h2>
                    <small>Salin kode di atas</small>
                </div>
            </div>
        </div>

        <div id="page-finance" class="page">
            <div class="card">
                <b>Ekspor Laporan Bulanan</b>
                <button class="btn btn-outline" onclick="exportCSV()">Unduh Excel (.csv)</button>
            </div>
            <div class="card">
                <b>Riwayat Transaksi</b>
                <div id="trans-list"></div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    // --- KONFIGURASI FIREBASE ---
    const firebaseConfig = {
  apiKey: "AIzaSyCF0QRlH5SAYvAYndektj-PdwWsJDIm5Bo",
  authDomain: "wificentral1.firebaseapp.com",
  databaseURL: "https://wificentral1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "wificentral1",
  storageBucket: "wificentral1.firebasestorage.app",
  messagingSenderId: "864377868495",
  appId: "1:864377868495:web:756f3507d5233a5b42a7ba",
  measurementId: "G-G093DS8HHB"
};

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.state = { vouchers: [], transaksi: [], selectedPrice: 0 };

    const dbRef = ref(db, 'wifi_v3');
    onValue(dbRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            state.vouchers = data.vouchers || [];
            state.transaksi = data.transaksi || [];
            renderAll();
            document.getElementById('cloud-status').textContent = "Connected";
        }
    });

    window.sync = () => set(ref(db, 'wifi_v3'), { vouchers: state.vouchers, transaksi: state.transaksi });

    window.openPage = (id, btn) => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        btn.classList.add('active');
    };

    window.setPrice = (val, btn) => {
        state.selectedPrice = val;
        document.querySelectorAll('#page-vouch .btn-outline').forEach(b => b.style.borderColor = 'rgba(0,0,0,0.12)');
        btn.style.borderColor = 'var(--primary)';
    };

    window.generateVoucher = () => {
        if (!state.selectedPrice) return alert("Pilih harga!");
        const code = Math.random().toString(36).substring(2, 8).toUpperCase();
        const date = new Date().toLocaleDateString('id-ID');
        
        state.vouchers.unshift({ code, price: state.selectedPrice, date });
        state.transaksi.unshift({ title: `Voucher ${code}`, amount: state.selectedPrice, date, type: 'in' });
        
        document.getElementById('v-code').textContent = code;
        document.getElementById('v-result').style.display = 'block';
        sync(); renderAll();
    };

    window.exportCSV = () => {
        if (state.transaksi.length === 0) return alert("Data kosong");
        const monthYear = new Date().toLocaleString('id-ID', { month: 'long', year: 'numeric' });
        let csv = `LAPORAN BULANAN WIFI central1 - ${monthYear}\n\n`;
        csv += "Tanggal,Keterangan,Pemasukan,Pengeluaran\n";
        
        let totalIn = 0;
        state.transaksi.forEach(t => {
            const val = t.amount;
            totalIn += val;
            csv += `${t.date},${t.title},${val},0\n`;
        });

        csv += `\nTOTAL SALDO BULAN INI,,Rp${totalIn}\n`;
        
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Laporan_WiFi_${monthYear}.csv`;
        a.click();
    };

    window.deleteItem = (index) => {
        if(confirm("Hapus data ini?")) {
            state.transaksi.splice(index, 1);
            sync(); renderAll();
        }
    }

    function renderAll() {
        const now = new Date().toLocaleDateString('id-ID');
        const monthData = state.transaksi.filter(t => t.date.split('/')[1] === now.split('/')[1]);
        
        const total = monthData.reduce((a, b) => a + b.amount, 0);
        document.getElementById('month-total').textContent = "Rp" + total.toLocaleString('id-ID');
        document.getElementById('month-count').textContent = monthData.length;

        document.getElementById('trans-list').innerHTML = state.transaksi.map((t, i) => `
            <div class="list-item">
                <span>${t.title}<br><small>${t.date}</small></span>
                <div style="text-align:right">
                    <span class="text-green">Rp${t.amount.toLocaleString('id-ID')}</span><br>
                    <small style="color:red; cursor:pointer" onclick="deleteItem(${i})">Hapus</small>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
